name: Set Firebase Storage CORS

on:
  workflow_dispatch:

jobs:
  set-cors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud / gsutil
        uses: google-github-actions/setup-gcloud@v2

      - name: Apply CORS config to Firebase Storage bucket
        run: gsutil cors set cors.json gs://guidedtechapp.firebasestorage.app

      - name: Verify CORS was applied
        run: gsutil cors get gs://guidedtechapp.firebasestorage.app
