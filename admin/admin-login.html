<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login — Guided Tech Solutions</title>
  <link rel="shortcut icon" href="../asset/logo-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .admin-login-container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
      max-width: 440px;
      width: 100%;
      overflow: hidden;
    }

    .admin-login-header {
      background: linear-gradient(135deg, #1B4F72 0%, #2471a3 100%);
      padding: 48px 40px;
      text-align: center;
      color: white;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container img {
      width: 50px;
      height: 50px;
      filter: brightness(0) invert(1);
    }

    .admin-login-header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .admin-login-header p {
      font-size: 15px;
      opacity: 0.95;
      font-weight: 400;
    }

    .admin-login-body {
      padding: 40px;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 32px;
    }

    .welcome-text h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .welcome-text p {
      font-size: 14px;
      color: #64748b;
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, rgba(27, 79, 114, 0.1), rgba(36, 113, 163, 0.1));
      border: 1px solid rgba(27, 79, 114, 0.2);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #1B4F72;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1B4F72;
      box-shadow: 0 0 0 3px rgba(27, 79, 114, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1B4F72, #2471a3);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 12px rgba(27, 79, 114, 0.3);
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #154360, #1e5f88);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(27, 79, 114, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
      font-size: 14px;
      color: #64748b;
    }

    .back-link a {
      color: #1B4F72;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .admin-login-header {
        padding: 36px 24px;
      }

      .admin-login-body {
        padding: 32px 24px;
      }

      .admin-login-header h1 {
        font-size: 24px;
      }

      .welcome-text h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="admin-login-container">
    <!-- Header -->
    <div class="admin-login-header">
      <div class="logo-container">
        <img src="../asset/logo-icon.png" alt="Guided Tech Solutions">
      </div>
      <h1>GTS Admin</h1>
      <p>Administrator Access Portal</p>
    </div>

    <!-- Body -->
    <div class="admin-login-body">
      <div class="welcome-text">
        <div class="admin-badge">
          🔐 Admin Access Only
        </div>
        <h2>Admin Sign In</h2>
        <p>Enter your administrator credentials</p>
      </div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage"></div>

      <!-- Login Form -->
      <form id="adminLoginForm" method="POST" action="javascript:void(0);">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" name="email" placeholder="admin@guidedtechms.com" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Sign In to Admin
        </button>
      </form>

      <!-- Back Link -->
      <div class="back-link">
        <a href="../index.html">← Back to Main Site</a>
      </div>
    </div>
  </div>

  <script type="module" src="./admin-login.js"></script>

</body>
</html>
