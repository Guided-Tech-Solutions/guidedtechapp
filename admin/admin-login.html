<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — GTS Amplify</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#1B4F72;--brand-dark:#0F2E42;--danger:#E53935;--danger-pale:#FDECEA;--border:#E2E8F0;--text:#0D1B2A;--text-muted:#64748B;--surface:#fff;--bg:#F2F5F9;--ff-d:'Outfit',sans-serif;--ff-b:'DM Sans',sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--ff-b);min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#080F1A,#0F2E42,#1B4F72);padding:1rem;-webkit-font-smoothing:antialiased}
    .card{background:var(--surface);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
    .logo{display:flex;align-items:center;gap:.625rem;margin-bottom:2rem}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--brand),#2471A3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
    .logo-text{font-family:var(--ff-d);font-size:.9375rem;font-weight:700;color:var(--brand)}
    .admin-tag{font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:var(--danger-pale);color:var(--danger);padding:.125rem .4375rem;border-radius:4px;margin-left:.25rem}
    h1{font-family:var(--ff-d);font-size:1.375rem;font-weight:700;color:var(--text);margin-bottom:.25rem}
    p{font-size:.875rem;color:var(--text-muted);margin-bottom:1.625rem}
    .form-group{margin-bottom:.875rem}
    label{display:block;font-size:.8125rem;font-weight:600;color:#334155;margin-bottom:.3rem}
    input{width:100%;padding:.625rem .875rem;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;color:var(--text);font-family:var(--ff-b);transition:all .2s}
    input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(27,79,114,.1)}
    input::placeholder{color:#94A3B8}
    .error{background:var(--danger-pale);border:1px solid rgba(229,57,53,.2);border-radius:8px;padding:.625rem .875rem;font-size:.8125rem;color:var(--danger);margin-bottom:.875rem;display:none}
    .error.show{display:block}
    button{width:100%;padding:.6875rem;background:var(--brand);color:white;border:none;border-radius:8px;font-weight:700;font-size:.9375rem;cursor:pointer;transition:all .2s;font-family:var(--ff-b);display:flex;align-items:center;justify-content:center;gap:.5rem}
    button:hover{background:var(--brand-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,79,114,.3)}
    button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .security-note{display:flex;align-items:center;gap:.375rem;background:var(--bg);border-radius:8px;padding:.625rem .875rem;margin-top:1rem;font-size:.75rem;color:var(--text-muted)}
    .back{display:block;text-align:center;margin-top:1rem;font-size:.8125rem;color:var(--text-muted);text-decoration:none}
    .back:hover{color:var(--brand)}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div>
      <span class="logo-text">GTS Amplify</span>
      <span class="admin-tag">Admin</span>
    </div>
  </div>
  <h1>Admin Sign In</h1>
  <p>Access restricted to authorized administrators only.</p>
  <div class="error" id="errorBox"></div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="admin@guidedtechsolutions.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="pwdInput" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button id="loginBtn">Sign In to Admin Panel</button>
  <div class="security-note">🔒 Secure area. All access is logged.</div>
  <a href="../index.html" class="back">← Back to website</a>
</div>
<script type="module">
import { auth, db } from "./firebase-admin.js";
import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const errBox   = document.getElementById("errorBox");
const loginBtn = document.getElementById("loginBtn");
const emailEl  = document.getElementById("emailInput");
const pwdEl    = document.getElementById("pwdInput");

function showErr(msg){ errBox.textContent=msg; errBox.classList.add("show"); }

async function doLogin() {
  const email=emailEl.value.trim(), pwd=pwdEl.value;
  if (!email||!pwd){ showErr("Enter your email and password."); return; }
  errBox.classList.remove("show");
  loginBtn.disabled=true; loginBtn.innerHTML='<span class="spinner"></span> Signing in...';
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pwd);
    const snap = await getDoc(doc(db,"Admins",cred.user.uid));
    if (!snap.exists()) {
      await auth.signOut();
      showErr("Access denied — your account is not an admin.");
      loginBtn.disabled=false; loginBtn.textContent="Sign In to Admin Panel"; return;
    }
    window.location.href = "./admin-dashboard.html";
  } catch(e) {
    const msgs={"auth/wrong-password":"Incorrect password.","auth/user-not-found":"No account with this email.","auth/invalid-credential":"Invalid email or password.","auth/too-many-requests":"Too many attempts. Try later."};
    showErr(msgs[e.code]||e.message);
    loginBtn.disabled=false; loginBtn.textContent="Sign In to Admin Panel";
  }
}
loginBtn.addEventListener("click", doLogin);
pwdEl.addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
onAuthStateChanged(auth, async user=>{
  if (user) {
    const snap=await getDoc(doc(db,"Admins",user.uid));
    if (snap.exists()) window.location.href="./admin-dashboard.html";
  }
});
</script>
</body>
</html>
