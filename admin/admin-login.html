<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — GTS Amplify</title>
  <link rel="icon" href="../asset/logo-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#3A7BF7;--brand-dark:#2563EB;--danger:#F87171;--danger-pale:rgba(248,113,113,.15);--border:rgba(255,255,255,.1);--text:#E8EDF5;--text-mid:#CBD5E1;--text-muted:rgba(255,255,255,.45);--surface:rgba(255,255,255,.05);--bg:rgba(255,255,255,.04);--ff-d:'Outfit',sans-serif;--ff-b:'DM Sans',sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--ff-b);min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#060D18,#0B0F1A,#0F2840);padding:1rem;-webkit-font-smoothing:antialiased}
    .card{background:rgba(255,255,255,.05);border:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .logo{display:flex;align-items:center;gap:.625rem;margin-bottom:2rem}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#1B4F72,#3A7BF7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
    .logo-text{font-family:var(--ff-d);font-size:.9375rem;font-weight:700;color:var(--text)}
    .admin-tag{font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:rgba(248,113,113,.15);color:#F87171;padding:.125rem .4375rem;border-radius:4px;margin-left:.25rem}
    h1{font-family:var(--ff-d);font-size:1.375rem;font-weight:700;color:var(--text);margin-bottom:.25rem}
    p{font-size:.875rem;color:var(--text-muted);margin-bottom:1.625rem}
    .form-group{margin-bottom:.875rem}
    label{display:block;font-size:.8125rem;font-weight:600;color:var(--text-mid);margin-bottom:.3rem}
    input{width:100%;padding:.625rem .875rem;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;color:var(--text);background:rgba(255,255,255,.04);font-family:var(--ff-b);transition:all .2s}
    input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(58,123,247,.2)}
    input::placeholder{color:rgba(255,255,255,.25)}
    .error{background:var(--danger-pale);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:.625rem .875rem;font-size:.8125rem;color:var(--danger);margin-bottom:.875rem;display:none}
    .error.show{display:block}
    button{width:100%;padding:.6875rem;background:linear-gradient(135deg,#1B4F72,#3A7BF7);color:white;border:none;border-radius:8px;font-weight:700;font-size:.9375rem;cursor:pointer;transition:all .2s;font-family:var(--ff-b);display:flex;align-items:center;justify-content:center;gap:.5rem}
    button:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(58,123,247,.3)}
    button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .security-note{display:flex;align-items:center;gap:.375rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:.625rem .875rem;margin-top:1rem;font-size:.75rem;color:var(--text-muted)}
    .back{display:block;text-align:center;margin-top:1rem;font-size:.8125rem;color:var(--text-muted);text-decoration:none}
    .back:hover{color:var(--brand)}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .divider{display:flex;align-items:center;gap:.75rem;margin:.75rem 0;color:var(--text-muted);font-size:.8125rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .google-btn{background:rgba(255,255,255,.06);color:var(--text);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:.625rem;font-size:.875rem;font-weight:600;margin-top:0}
    .google-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><img src="../asset/logo-icon.png" alt="GTS Amplify" style="width:28px;height:28px;object-fit:contain;border-radius:6px"></div>
    <div>
      <span class="logo-text">GTS Amplify</span>
      <span class="admin-tag">Admin</span>
    </div>
  </div>
  <h1>Admin Sign In</h1>
  <p>Access restricted to authorized administrators only.</p>
  <div class="error" id="errorBox"></div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="admin@guidedtechsolutions.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="pwdInput" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button id="loginBtn">Sign In to Admin Panel</button>
  <div class="divider"><span>or</span></div>
  <button id="googleBtn" class="google-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google"> Continue with Google</button>
  <div class="security-note">🔒 Secure area. All access is logged.</div>
  <a href="../index.html" class="back">Back to website</a>
</div>
<script type="module">
import { auth, db } from "./firebase-admin.js";
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const errBox   = document.getElementById("errorBox");
const loginBtn = document.getElementById("loginBtn");
const googleBtn = document.getElementById("googleBtn");
const emailEl  = document.getElementById("emailInput");
const pwdEl    = document.getElementById("pwdInput");

function showErr(msg){ errBox.textContent=msg; errBox.classList.add("show"); }

async function checkAdminAndRedirect(user) {
  const snap = await getDoc(doc(db,"Admins",user.uid));
  if (!snap.exists()) {
    await auth.signOut();
    showErr("Access denied — your account is not an admin.");
    return false;
  }
  window.location.href = "./admin-dashboard.html";
  return true;
}

async function doLogin() {
  const email=emailEl.value.trim(), pwd=pwdEl.value;
  if (!email||!pwd){ showErr("Enter your email and password."); return; }
  errBox.classList.remove("show");
  loginBtn.disabled=true; loginBtn.innerHTML='<span class="spinner"></span> Signing in...';
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pwd);
    await checkAdminAndRedirect(cred.user);
  } catch(e) {
    const msgs={"auth/wrong-password":"Incorrect password.","auth/user-not-found":"No account with this email.","auth/invalid-credential":"Invalid email or password.","auth/too-many-requests":"Too many attempts. Try later."};
    showErr(msgs[e.code]||e.message);
  }
  loginBtn.disabled=false; loginBtn.textContent="Sign In to Admin Panel";
}

async function doGoogleLogin() {
  errBox.classList.remove("show");
  googleBtn.disabled=true; googleBtn.innerHTML='<span class="spinner" style="border-color:rgba(0,0,0,.2);border-top-color:var(--brand)"></span> Signing in...';
  try {
    const cred = await signInWithPopup(auth, new GoogleAuthProvider());
    const ok = await checkAdminAndRedirect(cred.user);
    if (!ok) { googleBtn.disabled=false; googleBtn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google"> Continue with Google'; }
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showErr(e.message);
    googleBtn.disabled=false; googleBtn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google"> Continue with Google';
  }
}

loginBtn.addEventListener("click", doLogin);
googleBtn.addEventListener("click", doGoogleLogin);
pwdEl.addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
</script>
</body>
</html>
